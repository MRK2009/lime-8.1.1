name: Android CI
on:
  workflow_dispatch:
  workflow_call:

jobs:
  android:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Set HAXEPATH
        run: |
          echo "HAXEPATH=$HAXE_STD_PATH/.." >> $GITHUB_ENV

      - name: Install Haxe dependencies
        run: |
          haxelib git hxcpp https://github.com/CodenameCrew/hxcpp old --quiet
          haxelib install format --quiet
          haxelib install hxp --quiet
          haxelib dev lime $GITHUB_WORKSPACE

      - name: Configure Android support
        run: |
          haxelib run lime setup -alias -y
          lime config ANDROID_SDK $ANDROID_HOME
          lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          lime config JAVA_HOME $JAVA_HOME_17_arm64
          lime config ANDROID_SETUP true

      - name: Rebuild Lime
        run: |
          rm -rf ./ndll
          mkdir ./ndll
          lime rebuild android -eval -nocolor -nocffi -release

      - uses: actions/upload-artifact@v4
        with:
          name: Android-NDLL
          path: ndll
          if-no-files-found: error
