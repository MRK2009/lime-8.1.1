name: Linux CI
on:
  workflow_dispatch:
  workflow_call:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Set HAXEPATH
        run: |
          echo "HAXEPATH=$HAXE_STD_PATH/.." >> $GITHUB_ENV

      - name: Install Haxe dependencies
        run: |
          sudo apt-get install -qq libgl1-mesa-dev libglu1-mesa-dev libpulse-dev g++ g++-multilib gcc-multilib libasound2-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxinerama-dev
          haxelib git hxcpp https://github.com/CodenameCrew/cne-hxcpp old --quiet
          haxelib install format --quiet
          haxelib install hxp --quiet
          haxelib dev lime $GITHUB_WORKSPACE

      - name: Rebuild Lime
        run: |
          rm -rf ./ndll
          mkdir ./ndll
          haxelib run lime rebuild linux -32 -eval -nocolor -nocffi
          haxelib run lime rebuild linux -64 -eval -nocolor -nocffi

      - uses: actions/upload-artifact@v4
        with:
          name: Linux-NDLL
          path: ndll
          if-no-files-found: error
